allowBuilds:
  "@google/genai": true
  "@infisical/cli": true
  "@prisma/engines": true
  "@sentry/cli": true
  esbuild: true
  fallow: true
  msw: true
  prisma: true
  protobufjs: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "coolify-ghcr-deploy"

onlyBuiltDependencies:
  - "@google/genai"
  - "@infisical/cli"
  - "@prisma/client"
  - "@prisma/engines"
  - "@sentry/cli"
  - core-js
  - esbuild
  - fallow
  - libpq
  - msw
  - prisma
  - protobufjs
  - sharp

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"

supportedArchitectures:
  os: [darwin, linux]
  cpu: [arm64, x64]
