allowBuilds:
  "@google/genai": true
  "@infisical/cli": true
  "@prisma/engines": true
  "@sentry/cli": true
  esbuild: true
  fallow: true
  msw: true
  prisma: true
  protobufjs: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "coolify-ghcr-deploy"
  - "@fallow-cli/darwin-arm64@2.98.0"
  - "@fallow-cli/darwin-x64@2.98.0"
  - "@fallow-cli/linux-arm64-gnu@2.98.0"
  - "@fallow-cli/linux-arm64-musl@2.98.0"
  - "@fallow-cli/linux-x64-gnu@2.98.0"
  - "@fallow-cli/linux-x64-musl@2.98.0"
  - "@fallow-cli/win32-arm64-msvc@2.98.0"
  - "@fallow-cli/win32-x64-msvc@2.98.0"
  - "@infisical/cli@0.43.96"
  - "@voidzero-dev/vite-plus-core@0.2.0"
  - "@voidzero-dev/vite-plus-darwin-arm64@0.2.0"
  - "@voidzero-dev/vite-plus-darwin-x64@0.2.0"
  - "@voidzero-dev/vite-plus-linux-arm64-gnu@0.2.0"
  - "@voidzero-dev/vite-plus-linux-arm64-musl@0.2.0"
  - "@voidzero-dev/vite-plus-linux-x64-gnu@0.2.0"
  - "@voidzero-dev/vite-plus-linux-x64-musl@0.2.0"
  - "@voidzero-dev/vite-plus-win32-arm64-msvc@0.2.0"
  - "@voidzero-dev/vite-plus-win32-x64-msvc@0.2.0"
  - fallow@2.98.0
  - fast-xml-parser@5.9.2
  - openai@6.44.0
  - resend@6.14.0
  - vite-plus@0.2.0

onlyBuiltDependencies:
  - "@google/genai"
  - "@infisical/cli"
  - "@prisma/client"
  - "@prisma/engines"
  - "@sentry/cli"
  - core-js
  - esbuild
  - fallow
  - libpq
  - msw
  - prisma
  - protobufjs
  - sharp

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"

supportedArchitectures:
  os: [darwin, linux]
  cpu: [arm64, x64]

blockExoticSubdeps: true
