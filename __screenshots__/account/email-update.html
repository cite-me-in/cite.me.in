<div
  class="rounded-base border-border font-base shadow-shadow fade-in-0 zoom-in-95 animate-in bg-secondary-background text-secondary-foreground flex w-full max-w-md flex-col gap-6 space-y-4 border-2 py-6 duration-300"
  data-slot="card"
>
  <div
    class="@container/card-header grid auto-rows-min grid-rows-[auto_auto] items-start gap-1.5 px-6 has-[data-slot=card-action]:grid-cols-[1fr_auto] [.border-b]:pb-6"
    data-slot="card-header"
  >
    <div
      class="font-heading flex items-center justify-center gap-2 text-2xl leading-none"
      data-slot="card-title"
    >
      Update your profile
    </div>
  </div>
  <div class="px-6" data-slot="card-content">
    <div class="space-y-8">
      <div
        class="space-y-8"
        data-activation-direction="none"
        data-orientation="horizontal"
      >
        <div class="flex justify-center">
          <div
            class="rounded-base inline-flex items-center justify-center gap-2 border-2 border-black bg-[hsl(60,100%,99%)] p-2 shadow-[2px_2px_0px_0px_black]"
            data-activation-direction="none"
            data-orientation="horizontal"
            role="tablist"
          >
            <button
              aria-controls="base-ui-_r_5_"
              aria-disabled="false"
              aria-selected="true"
              class="rounded-base inline-flex items-center justify-center border-2 border-transparent px-4 py-2 text-base font-bold whitespace-nowrap text-black transition-all duration-100 hover:border-black hover:bg-white data-active:border-black data-active:bg-[#F59E0B] data-active:shadow-[2px_2px_0px_0px_black]"
              data-active
              data-composite-item-active
              data-orientation="horizontal"
              id="base-ui-_r_2_"
              role="tab"
              tabindex="0"
              type="button"
            >
              Email
            </button>
            <button
              aria-disabled="false"
              aria-selected="false"
              class="rounded-base inline-flex items-center justify-center border-2 border-transparent px-4 py-2 text-base font-bold whitespace-nowrap text-black transition-all duration-100 hover:border-black hover:bg-white data-active:border-black data-active:bg-[#F59E0B] data-active:shadow-[2px_2px_0px_0px_black]"
              data-orientation="horizontal"
              id="base-ui-_r_3_"
              role="tab"
              tabindex="-1"
              type="button"
            >
              Password
            </button>
            <button
              aria-disabled="false"
              aria-selected="false"
              class="rounded-base inline-flex items-center justify-center border-2 border-transparent px-4 py-2 text-base font-bold whitespace-nowrap text-black transition-all duration-100 hover:border-black hover:bg-white data-active:border-black data-active:bg-[#F59E0B] data-active:shadow-[2px_2px_0px_0px_black]"
              data-orientation="horizontal"
              id="base-ui-_r_4_"
              role="tab"
              tabindex="-1"
              type="button"
            >
              API Key
            </button>
          </div>
        </div>
        <div
          aria-labelledby="base-ui-_r_2_"
          class="ring-offset-background focus-visible:ring-ring mt-2 focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:outline-none"
          data-activation-direction="none"
          data-index="0"
          data-orientation="horizontal"
          id="base-ui-_r_5_"
          role="tabpanel"
          tabindex="0"
        >
          <form action="/profile" data-discover="true" method="post">
            <fieldset
              class="flex flex-col gap-6 has-[>[data-slot=checkbox-group]]:gap-3 has-[>[data-slot=radio-group]]:gap-3"
              data-slot="field-set"
            >
              <div
                class="group/field-group @container/field-group flex w-full flex-col gap-7 data-[slot=checkbox-group]:gap-3 *:data-[slot=field-group]:gap-4"
                data-slot="field-group"
              >
                <div
                  class="group/field data-[invalid=true]:text-destructive flex w-full flex-col gap-3 [&>*]:w-full [&>.sr-only]:w-auto"
                  data-orientation="vertical"
                  data-slot="field"
                >
                  <label
                    class="group/field-label peer/field-label has-data-[state=checked]:border-primary has-data-[state=checked]:bg-primary/5 dark:has-data-[state=checked]:bg-primary/10 flex w-fit items-center gap-2 text-base leading-snug font-medium select-none group-data-[disabled=true]:pointer-events-none group-data-[disabled=true]:opacity-50 group-data-[disabled=true]/field:opacity-50 peer-disabled:cursor-not-allowed peer-disabled:opacity-50 has-[>[data-slot=field]]:w-full has-[>[data-slot=field]]:flex-col has-[>[data-slot=field]]:rounded-md has-[>[data-slot=field]]:border *:data-[slot=field]:p-4"
                    data-slot="field-label"
                    for="email"
                  >
                    Your email address
                  </label>
                  <input
                    autocomplete="email"
                    class="rounded-base flex h-12 w-full border-2 border-black bg-white px-4 py-3 text-base font-medium text-black shadow-[2px_2px_0px_0px_black] transition-all duration-100 file:border-0 file:bg-transparent file:font-medium file:text-black placeholder:text-gray-600 focus-visible:translate-x-[-2px] focus-visible:translate-y-[-2px] focus-visible:shadow-[4px_4px_0px_0px_black] focus-visible:outline-none disabled:cursor-not-allowed disabled:bg-gray-100 disabled:opacity-50"
                    id="email"
                    name="email"
                    required
                    type="email"
                    value="profile-test@example.com"
                  />
                </div>
              </div>
              <button
                class="rounded-base inline-flex h-12 cursor-pointer items-center justify-center gap-2 border-2 border-black bg-[#F59E0B] px-6 py-3 text-base font-bold whitespace-nowrap text-black shadow-[3px_3px_0px_0px_black] transition-all duration-100 hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[5px_5px_0px_0px_black] focus-visible:outline-none active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_0px_black] disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0"
                type="submit"
              >
                Update email
              </button>
            </fieldset>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
