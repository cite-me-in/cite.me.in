<div class="flex flex-row items-center justify-between gap-4">
  <h1 class="font-heading text-3xl">Your Sites</h1>
  <button
    class="rounded-base inline-flex h-12 cursor-pointer items-center justify-center gap-2 border-2 border-black bg-[#F59E0B] px-6 py-3 text-base font-bold whitespace-nowrap text-black shadow-[3px_3px_0px_0px_black] transition-all duration-100 hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[5px_5px_0px_0px_black] focus-visible:outline-none active:translate-x-[2px] active:translate-y-[2px] active:shadow-[1px_1px_0px_0px_black] disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0"
  >
    Add Site
  </button>
</div>
<div
  class="rounded-base border-border font-base shadow-shadow bg-secondary-background text-foreground flex flex-col gap-6 border-2 py-6"
  data-slot="card"
>
  <div
    class="space-y-4 divide-y-2 divide-black/10 px-6"
    data-slot="card-content"
  >
    <div class="space-y-4">
      <div class="flex flex-row items-center justify-between">
        <a
          class="font-mono text-lg font-bold"
          data-discover="true"
          href="/site/id"
        >
          dashboard-test.com
        </a>
        <a
          aria-label="View site"
          class="rounded-base inline-flex items-center justify-center gap-2 border-2 border-black bg-[hsl(120,100%,97%)] px-4 py-2 whitespace-nowrap text-black shadow-[3px_3px_0px_0px_black] transition-all duration-100 hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_0px_black] focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0"
          data-discover="true"
          href="/site/id"
          rel="noopener noreferer"
        >
          View Site
          <svg
            aria-hidden="true"
            class="lucide lucide-arrow-right size-4"
            fill="none"
            height="24"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            viewBox="0 0 24 24"
            width="24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
        </a>
      </div>
      <a
        class="grid grid-cols-4 gap-4 text-center"
        data-discover="true"
        href="/site/id"
      >
        <div class="metric-your-citations">
          <div class="font-light whitespace-nowrap">Your citations</div>
          <div class="text-3xl font-bold tabular-nums">0</div>
          <div
            class="text-muted-foreground flex items-center justify-center gap-1 text-sm"
          ></div>
        </div>
        <div class="metric-all-citations">
          <div class="font-light whitespace-nowrap">All citations</div>
          <div class="text-3xl font-bold tabular-nums">0</div>
          <div
            class="text-muted-foreground flex items-center justify-center gap-1 text-sm"
          ></div>
        </div>
        <div class="metric-query-coverage">
          <div class="font-light whitespace-nowrap">Query Coverage</div>
          <div class="text-3xl font-bold tabular-nums">0%</div>
          <div
            class="text-muted-foreground flex items-center justify-center gap-1 text-sm"
          ></div>
        </div>
        <div class="metric-visibility-score">
          <div class="font-light whitespace-nowrap">Visibility Score</div>
          <div
            class="text-3xl font-bold tabular-nums"
            style="color: rgb(255, 77, 109)"
          >
            0%
          </div>
          <div
            class="text-muted-foreground flex items-center justify-center gap-1 text-sm"
          ></div>
        </div>
      </a>
      <div
        class="prose prose-sm text-foreground/60 mt-4 mb-4 line-clamp-2 max-w-none space-y-4 whitespace-normal italic [&>*:first-child]:mt-0 [&>*:last-child]:mb-0"
      >
        <p>Test summary</p>
      </div>
    </div>
  </div>
</div>
