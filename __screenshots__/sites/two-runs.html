<div class="flex flex-row items-center justify-between gap-4">
  <h1 class="font-heading text-3xl">
    Your Sites
  </h1>

    Add Site

</div>
<div class="flex flex-col gap-6 rounded-base border-2 border-border py-6 font-base shadow-shadow bg-secondary-background text-foreground" data-slot="card">
  <div class="px-6 space-y-4 divide-y-2 divide-black/10" data-slot="card-content">
    <div class="space-y-4">
      <div class="flex flex-row items-center justify-between">
        <a class="font-bold font-mono text-lg" data-discover="true" href="/site/id">
          delta-test.com
        </a>
        <a aria-label="View site" class="inline-flex items-center justify-center gap-2 whitespace-nowrap transition-all duration-100 focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 rounded-base border-2 border-black bg-[hsl(120,100%,97%)] text-black shadow-[3px_3px_0px_0px_black] hover:translate-x-[-2px] hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_0px_black] px-4 py-2" data-discover="true" href="/site/id" rel="noopener noreferer">
          View Site
          <svg aria-hidden="true" class="lucide lucide-arrow-right size-4" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
        </a>
      </div>
      <a class="grid grid-cols-4 gap-4 text-center" data-discover="true" href="/site/id">
        <div class="metric-your-citations">
          <div class="whitespace-nowrap font-light">
            Your citations
          </div>
          <div class="font-bold text-3xl tabular-nums">
            10
          </div>
          <div class="flex items-center justify-center gap-1 text-muted-foreground text-sm">
            <span class="font-medium text-green-700 text-sm">
              new
            </span>
          </div>
        </div>
        <div class="metric-all-citations">
          <div class="whitespace-nowrap font-light">
            All citations
          </div>
          <div class="font-bold text-3xl tabular-nums">
            10
          </div>
          <div class="flex items-center justify-center gap-1 text-muted-foreground text-sm">
            <span class="font-medium text-green-700 text-sm">
              new
            </span>
          </div>
        </div>
        <div class="metric-visibility-score">
          <div class="whitespace-nowrap font-light">
            Visibility Score
          </div>
          <div class="font-bold text-3xl tabular-nums">

          <div class="flex items-center justify-center gap-1 text-muted-foreground text-sm">
            <span class="font-medium text-green-700 text-sm">
              new
            </span>
          </div>
        </div>
        <div class="metric-bot-visits">

            0
          </div>
          <div class="flex items-center justify-center gap-1 text-muted-foreground text-sm"></div>
        </div>
      </a>
      <div class="space-y-4 whitespace-normal [&amp;&gt;*:first-child]:mt-0 [&amp;&gt;*:last-child]:mb-0 prose prose-sm mt-4 mb-4 line-clamp-2 max-w-none text-foreground/60 italic">

    </div>
