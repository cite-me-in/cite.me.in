<div class="flex items-center justify-between gap-4">
  <div>
    <p>
      <a
        class="block max-w-md truncate font-mono text-foreground/60 hover:underline"
        data-discover="true"
        href="/site/traffic-test.example.com"
        title="traffic-test.example.com"
      >
        traffic-test.example.com
      </a>
    </p>
    <h1 class="font-heading text-3xl">Traffic</h1>
  </div>
  <div data-activation-direction="none" data-orientation="horizontal">
    <div
      class="inline-flex items-center justify-center gap-2 rounded-base border-2 border-black bg-[hsl(60,100%,99%)] p-2 shadow-[2px_2px_0px_0px_black]"
      data-activation-direction="none"
      data-orientation="horizontal"
      role="tablist"
    >
      <button
        aria-disabled="false"
        aria-selected="false"
        class="inline-flex items-center justify-center whitespace-nowrap rounded-base border-2 border-transparent px-4 py-2 font-bold text-base text-black transition-all duration-100 hover:border-black hover:bg-white data-active:border-black data-active:bg-[#F59E0B] data-active:shadow-[2px_2px_0px_0px_black]"
        data-orientation="horizontal"
        id="base-ui-_r_2_"
        role="tab"
        tabindex="-1"
        title="Select the last 14 days"
        type="button"
      >
        Last 14 Days
      </button>
      <button
        aria-disabled="false"
        aria-selected="true"
        class="inline-flex items-center justify-center whitespace-nowrap rounded-base border-2 border-transparent px-4 py-2 font-bold text-base text-black transition-all duration-100 hover:border-black hover:bg-white data-active:border-black data-active:bg-[#F59E0B] data-active:shadow-[2px_2px_0px_0px_black]"
        data-orientation="horizontal"
        id="base-ui-_r_3_"
        role="tab"
        tabindex="0"
        title="Select the last 30 days"
        type="button"
      >
        Last 30 Days
      </button>
      <button
        aria-disabled="false"
        aria-selected="false"
        class="inline-flex items-center justify-center whitespace-nowrap rounded-base border-2 border-transparent px-4 py-2 font-bold text-base text-black transition-all duration-100 hover:border-black hover:bg-white data-active:border-black data-active:bg-[#F59E0B] data-active:shadow-[2px_2px_0px_0px_black]"
        data-orientation="horizontal"
        id="base-ui-_r_4_"
        role="tab"
        tabindex="-1"
        title="Select the last 90 days"
        type="button"
      >
        Last 90 Days
      </button>
    </div>
  </div>
</div>
<section class="space-y-6">
  <div
    class="flex flex-col gap-6 rounded-base border-2 border-border py-6 font-base shadow-shadow bg-secondary-background text-foreground"
    data-slot="card"
  >
    <div
      class="@container/card-header grid auto-rows-min grid-rows-[auto_auto] items-start gap-1.5 px-6 has-[data-slot=card-action]:grid-cols-[1fr_auto] [.border-b]:pb-6"
      data-slot="card-header"
    >
      <div
        class="flex items-center justify-center gap-2 font-heading text-2xl leading-none"
        data-slot="card-title"
      >
        No visitors recorded
      </div>
    </div>
    <div class="px-6" data-slot="card-content">
      <p class="text-base text-foreground/60">
        Install the tracking snippet on
        <span class="font-mono"> traffic-test.example.com </span>
        to start seeing human visitor data here.
      </p>
    </div>
  </div>
</section>
