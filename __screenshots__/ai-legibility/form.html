<div class="mx-auto max-w-4xl py-12">
  <div class="mb-12 text-center">
    <h1 class="mb-4 font-bold text-4xl text-black md:text-5xl">
      AI Legibility Checker
    </h1>
    <p class="text-black/60 text-lg">
      Check if your website is readable by AI agents like ChatGPT, Claude, and Gemini. Get actionable suggestions to improve discoverability.
    </p>
  </div>
  <div class="flex flex-col gap-6 rounded-base border-2 border-border py-6 font-base shadow-shadow bg-[hsl(47,100%,95%)]" data-slot="card">
    <div class="@container/card-header grid auto-rows-min grid-rows-[auto_auto] items-start gap-1.5 px-6 has-[data-slot=card-action]:grid-cols-[1fr_auto] [.border-b]:pb-6" data-slot="card-header">
      <div class="flex items-center justify-center gap-2 font-heading text-2xl leading-none" data-slot="card-title">
        Check your website
      </div>
    </div>
    <div class="px-6" data-slot="card-content">
      <form class="space-y-4">
        <p class="text-base text-foreground/60">
          Enter your website URL to check if it's readable by AI agents.
        </p>
        <div class="group/field data-[invalid=true]:text-destructive flex w-full gap-3 flex-col [&amp;&gt;*]:w-full [&amp;&gt;.sr-only]:w-auto" data-orientation="vertical" data-slot="field">
          <label class="select-none items-center font-medium text-base peer-disabled:cursor-not-allowed peer-disabled:opacity-50 group-data-[disabled=true]:pointer-events-none group-data-[disabled=true]:opacity-50 group/field-label peer/field-label flex w-fit gap-2 leading-snug group-data-[disabled=true]/field:opacity-50 has-[&gt;[data-slot=field]]:w-full has-[&gt;[data-slot=field]]:flex-col has-[&gt;[data-slot=field]]:rounded-md has-[&gt;[data-slot=field]]:border *:data-[slot=field]:p-4 has-data-[state=checked]:border-primary has-data-[state=checked]:bg-primary/5 dark:has-data-[state=checked]:bg-primary/10" data-slot="field-label" for="url">
            Website URL
          </label>
          <div class="flex justify-between gap-4">
            <input aria-label="Website URL" class="flex h-12 w-full rounded-base border-2 px-4 py-3 font-medium text-base text-black shadow-[2px_2px_0px_0px_black] transition-all duration-100 file:border-0 file:bg-transparent file:font-medium file:text-black placeholder:text-gray-600 focus-visible:translate-x-[-2px] focus-visible:translate-y-[-2px] focus-visible:shadow-[4px_4px_0px_0px_black] focus-visible:outline-none disabled:cursor-not-allowed disabled:bg-gray-100 disabled:opacity-50 border-black bg-white" id="url" name="url" placeholder="https://yoursite.com" type="text" />
            <button class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-bold text-base transition-all duration-100 focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 cursor-pointer rounded-base border-2 border-black bg-[#F59E0B] text-black shadow-[3px_3px_0px_0px_black] hover:shadow-[5px_5px_0px_0px_black] hover:translate-x-[-2px] hover:translate-y-[-2px] active:shadow-[1px_1px_0px_0px_black] active:translate-x-[2px] active:translate-y-[2px] h-12 px-6 py-3" type="submit">
              Scan Website
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
