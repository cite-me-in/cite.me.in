<div class="flex flex-row items-center justify-between gap-4">
  <h1 class="font-heading text-3xl">
    Your Sites
  </h1>
</div>
<div class="flex flex-col gap-6 rounded-base border-2 border-border py-6 font-base shadow-shadow bg-[hsl(47,100%,95%)] fade-in-0 zoom-in-95 animate-in duration-300" data-slot="card">
  <div class="@container/card-header grid auto-rows-min grid-rows-[auto_auto] items-start gap-1.5 px-6 has-[data-slot=card-action]:grid-cols-[1fr_auto] [.border-b]:pb-6" data-slot="card-header">
    <div class="flex items-center justify-center gap-2 font-heading text-2xl leading-none" data-slot="card-title">
      Add a Site
    </div>
  </div>
  <div class="px-6" data-slot="card-content">
    <div class="space-y-4">
      <div class="flex items-center gap-3">
        <div class="size-6 animate-spin rounded-full border-2 border-foreground/20 border-t-foreground"></div>
        Verifying domain and generating queries…
      </div>
      <p class="text-base text-foreground/60">
        Be patient, nothing will happen for a few seconds. We're going to check the domain and generate queries to ask Claude, OpenAI, Google, and Perplexity to see if they return any citations.
      </p>
      <p class="text-base text-foreground/60">
        The domain we're adding is
        <code>
          example.com
        </code>
      </p>
    </div>
  </div>
</div>
