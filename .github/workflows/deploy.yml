name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  UPDATE_SNAPSHOT: "true"
  INFISICAL_CLIENT_ID: "f61bf12f-03e0-4fc9-963b-f116b3bfd0fa"
  INFISICAL_CLIENT_SECRET: "0ae805a36044b33072321abf428b03f1f868c7c5234e252e40cc26d6c0ae05bf"
  INFISICAL_PROJECT_SLUG: "cite-me-in"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: citeup_test
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options:
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Clear stale pnpm installation
        run: rm -rf ~/setup-pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm store path | xargs rm -rf && pnpm install --frozen-lockfile

      - name: Install Playwright and system dependencies
        run: pnpm exec playwright install chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Get test secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ env.INFISICAL_CLIENT_ID }}
          client-secret: ${{ env.INFISICAL_CLIENT_SECRET }}
          env-slug: "test"
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}

      - name: Prepare application
        run: |
          pnpm prisma generate
          pnpm prisma db push
          pnpm react-router typegen
          pnpm exec tsx app/lib/cron/writeConfig.ts

      - name: Run checks
        run: |
          pnpm exec secretlint --format stylish
          pnpm exec react-router typegen
          # vp check --fix removed (vite-plus replaced with vite + vitest)
          pnpm exec knip

      - name: Run tests
        run: DEBUG=server,app:*,browser pnpm vitest run
        env:
          NODE_OPTIONS: --enable-source-maps
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY_ID: ${{ secrets.STRIPE_TEST_PRICE_MONTHLY_ID }}
          STRIPE_PRICE_ANNUAL_ID: ${{ secrets.STRIPE_TEST_PRICE_ANNUAL_ID }}

      - name: Run Playwright
        run: pnpm playwright test
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY_ID: ${{ secrets.STRIPE_TEST_PRICE_MONTHLY_ID }}
          STRIPE_PRICE_ANNUAL_ID: ${{ secrets.STRIPE_TEST_PRICE_ANNUAL_ID }}

      - name: Get production secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ env.INFISICAL_CLIENT_ID }}
          client-secret: ${{ env.INFISICAL_CLIENT_SECRET }}
          env-slug: "prod"
          export-type: "file"
          file-output-path: "/.env"
          project-slug: ${{ env.INFISICAL_PROJECT_SLUG }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Coolify
        uses: assaf/coolify-deploy@v1.4.0
        with:
          coolify-url: "https://coolify.labnotes.org"
          app-name: "cite.me.in"
          image: "ghcr.io/cite-me-in/cite.me.in:latest"
          coolify-token: ${{ secrets.COOLIFY_TOKEN }}
          env-file: ".env"
          healthcheck-path: "/"
          healthcheck-timeout: "60"

      - name: Sync cron tasks
        run: pnpm exec tsx app/lib/cron/syncTasks.ts
        env:
          COOLIFY_URL: "https://coolify.labnotes.org"
          COOLIFY_APP: "cite.me.in"
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
