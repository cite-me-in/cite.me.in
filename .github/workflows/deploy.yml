name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  POSTGRES_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
  POSTGRES_URL_NON_POOLING: "postgresql://postgres:postgres@localhost:5432/postgres"
  REDIS_URL: "redis://localhost:6379"
  NODE_ENV: "test"
  CI: "true"
  UPDATE_SNAPSHOT: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options:
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          cache: "pnpm"
          node-version-file: "package.json"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright system dependencies
        run: sudo pnpm exec playwright install-deps chromium

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Prepare application
        run: pnpm ready

      - name: Run checks
        run: pnpm run check

      - name: Run tests
        run: pnpm vp test run

      - name: Run Playwright
        run: pnpm playwright test

      - name: Get Infisical secrets
        uses: zerodays/action-infisical@v1
        with:
          environment: "prod"
          infisical_token: ${{ secrets.INFISICAL_TOKEN }}
          output_file: ".env"
          workspace_id: "a89716e5-9232-4ee7-85ea-11977924fe95"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64
          secret-files: env=.env
          tags: ghcr.io/cite-me-in/cite.me.in:latest

      - name: Deploy to Coolify
        uses: themarkwill/coolify-actions@v0.0.4
        with:
          coolify-app-id: "myp73fab3pizwxq1coahwxqw"
          coolify-token: ${{ secrets.COOLIFY_TOKEN }}
          coolify-url: https://coolify.labnotes.org
