name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: "pnpm"
          node-version-file: "package.json"

      - name: Install dependencies
        run: pnpm install

      - name: Run checks
        run: pnpm run check

      - name: Run tests
        run: pnpm vp test run

      - name: Run Playwright
        run: pnpm playwright test

      - name: Get Infisical secrets
        uses: zerodays/action-infisical@v1
        with:
          environment: "prod"
          infisical_token: ${{ secrets.INFISICAL_TOKEN }}
          output_file: ".env"
          workspace_id: "a89716e5-9232-4ee7-85ea-11977924fe95"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64
          secret-files: env=.env
          tags: ghcr.io/cite-me-in/cite.me.in:latest

      - name: Deploy to Coolify
        uses: themarkwill/coolify-actions@v0.0.4
        with:
          coolify-app-id: "myp73fab3pizwxq1coahwxqw"
          coolify-token: ${{ secrets.COOLIFY_TOKEN }}
          coolify-url: https://coolify.labnotes.org
