name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_checks:
        description: "Skip checks and tests"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--max-old-space-size=3096"
  POSTGRES_URL_NON_POOLING: "postgresql://postgres:postgres@localhost:5432/citeup_test"
  POSTGRES_URL: "postgresql://postgres:postgres@localhost:5432/citeup_test?pgbouncer=true"
  INDEXNOW_KEY: ""
  ANTHROPIC_API_KEY: "sk-dummy"
  TRACK_API_KEY: "dummy"
  REDIS_URL: "redis://localhost:6379"
  RESEND_API_KEY: "re_dummy"
  SESSION_SECRET: "dummy-secret-at-least-32-chars-long-for-session"
  VITE_APP_URL: "http://localhost:3000"
  VITE_EMAIL_FROM: "hello@cite.me.in"
  ZHIPU_API_KEY: "dummy"
  OPENAI_API_KEY: "sk-dummy"
  PERPLEXITY_API_KEY: "pplx-dummy"
  GOOGLE_GENERATIVE_AI_API_KEY: "AIza-dummy"
  SERPAPI_API_KEY: "dummy"
  STRIPE_SECRET_KEY: "sk_test_dummy"
  CRON_SECRET: "test-cron-secret"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: citeup_test
        ports:
          - 5432:5432
        options:
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Cache NPM dependencies
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: ./node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install NPM dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run checks (lint, types, secrets)
        run: pnpm run check

      - name: Push DB schema
        run: pnpm prisma db push

      - name: Set PLAYWRIGHT_VERSION
        run: echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version)" >> $GITHUB_ENV

      - name: Cache Playwright
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright (Chromium)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_checks }}
        run: pnpm vp test run

      - name: Run Playwright Tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_checks }}
        run: pnpm playwright test

      - name: Upload Playwright Test Results
        if: failure()
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: playwright-test-results
          path: __screenshots__

      - uses: Infisical/secrets-action@v1.0.15
        with:
          method: "universal"
          identity-id: "2558782e-875b-4c3b-b40a-6d405dadffe0"
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          domain: "https://app.infisical.com"
          env-slug: "prod"
          project-slug: "cite-me-in"

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          secrets: |
            infisical_token=${{ secrets.INFISICAL_TOKEN }}
          build-args: |
            INFISICAL_ENV=prod
            POSTGRES_URL_NON_POOLING=${{ env.POSTGRES_URL_NON_POOLING }}
            POSTGRES_URL=${{ env.POSTGRES_URL }}
            ANTHROPIC_API_KEY=${{ env.ANTHROPIC_API_KEY }}
            TRACK_API_KEY=${{ env.TRACK_API_KEY }}
            REDIS_URL=${{ env.REDIS_URL }}
            RESEND_API_KEY=${{ env.RESEND_API_KEY }}
            SESSION_SECRET=${{ env.SESSION_SECRET }}
            VITE_APP_URL=${{ env.VITE_APP_URL }}
            VITE_EMAIL_FROM=${{ env.VITE_EMAIL_FROM }}
            ZHIPU_API_KEY=${{ env.ZHIPU_API_KEY }}
            OPENAI_API_KEY=${{ env.OPENAI_API_KEY }}
            PERPLEXITY_API_KEY=${{ env.PERPLEXITY_API_KEY }}
            GOOGLE_GENERATIVE_AI_API_KEY=${{ env.GOOGLE_GENERATIVE_AI_API_KEY }}
            SERPAPI_API_KEY=${{ env.SERPAPI_API_KEY }}
            STRIPE_SECRET_KEY=${{ env.STRIPE_SECRET_KEY }}
            INDEXNOW_KEY=${{ env.INDEXNOW_KEY }}

      - name: Trigger Coolify deployment
        if: github.ref == 'refs/heads/main'
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_URL: "https://coolify.labnotes.org"
          APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          curl -s -X POST "$COOLIFY_URL/api/v1/deploy?type=application&uuid=$APP_UUID" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" | jq

      - name: Upload IndexNow file
        uses: bojieyang/indexnow-action@v2
        with:
          sitemap-location: "https://cite.me.in/sitemap.xml"
          key: ${{ env.INDEXNOW_KEY }}
