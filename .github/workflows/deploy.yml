name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  UPDATE_SNAPSHOT: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: citeup_test
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options:
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm + Node.js
        uses: pnpm/setup@v1
        with:
          runtime: node@26
          install: true

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright and system dependencies
        run: pnpm exec playwright install chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Get test secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: "test"
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}

      - name: Prepare application
        run: |
          pnpm prisma generate
          pnpm prisma db push
          pnpm react-router typegen
          pnpm nub app/lib/cron/writeConfig.ts

      - name: Run checks
        run: pnpm check

      - name: Run tests
        run: pnpm vp test run
        env:
          NODE_OPTIONS: --enable-source-maps

      - name: Run Playwright
        run: pnpm playwright test

      - name: Get production secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: "prod"
          export-type: "file"
          file-output-path: "/.env"
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Coolify
        uses: assaf/coolify-deploy@v1.4.0
        with:
          coolify-url: "https://coolify.labnotes.org"
          app-name: "cite.me.in"
          image: "ghcr.io/cite-me-in/cite.me.in:latest"
          coolify-token: ${{ secrets.COOLIFY_TOKEN }}
          env-file: ".env"
          healthcheck-path: "/"
          healthcheck-timeout: "60"

      - name: Sync cron tasks
        run: pnpm nub app/lib/cron/syncTasks.ts
        env:
          COOLIFY_URL: "https://coolify.labnotes.org"
          COOLIFY_APP: "cite.me.in"
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
