name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
  DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
  NODE_ENV: "test"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          cache: "pnpm"
          node-version-file: "package.json"

      - name: Cache pnpm store
        id: cache-install
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-cache-install-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-install.outputs.cache-hit != 'true'
        run: pnpm install

      - name: Set PLAYWRIGHT_VERSION
        run: echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version)" >> $GITHUB_ENV

      - name: Install Playwright (Chromium)
        timeout-minutes: 5
        run: pnpm exec playwright install chromium --with-deps

      - name: Prepare application
        run: pnpm ready

      - name: Run checks
        run: pnpm run check

      - name: Run tests
        run: pnpm vp test run

      - name: Run Playwright
        run: pnpm playwright test

      - name: Get Infisical secrets
        uses: zerodays/action-infisical@v1
        with:
          environment: "prod"
          infisical_token: ${{ secrets.INFISICAL_TOKEN }}
          output_file: ".env"
          workspace_id: "a89716e5-9232-4ee7-85ea-11977924fe95"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platforms: linux/amd64
          secret-files: env=.env
          tags: ghcr.io/cite-me-in/cite.me.in:latest

      - name: Deploy to Coolify
        uses: themarkwill/coolify-actions@v0.0.4
        with:
          coolify-app-id: "myp73fab3pizwxq1coahwxqw"
          coolify-token: ${{ secrets.COOLIFY_TOKEN }}
          coolify-url: https://coolify.labnotes.org
