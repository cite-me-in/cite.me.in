name: Database Backup

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get production secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: "prod"
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}

      - name: Install pg_dump
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client-17

      - name: Dump, upload, and clean up
        shell: bash -eo pipefail {0}
        run: |
          FILE="backup-$(date +%Y-%m-%d).sql.gz"
          ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          # Dump
          /usr/lib/postgresql/17/bin/pg_dump --no-owner --clean --if-exists "$DATABASE_URL_NON_POOLING" \
            | gzip > "$FILE"

          # Upload to R2
          aws s3 cp "$FILE" "s3://$R2_BUCKET/" \
            --endpoint-url "$ENDPOINT" --no-progress

          # Delete backups older than 7 days
          cutoff=$(date -d '7 days ago' +%s)
          aws s3 ls "s3://$R2_BUCKET/" --endpoint-url "$ENDPOINT" \
            | awk '/backup-/ {print $NF}' \
            | while read -r key; do
                datepart="${key#backup-}"; datepart="${datepart%.sql.gz}"
                filesec=$(date -d "$datepart" +%s 2>/dev/null || true)
                [ -n "$filesec" ] && [ "$filesec" -lt "$cutoff" ] || continue
                echo "Deleting $key"
                aws s3 rm "s3://$R2_BUCKET/$key" --endpoint-url "$ENDPOINT"
              done
